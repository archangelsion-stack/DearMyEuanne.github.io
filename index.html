<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Letter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5efe5;
    overflow:hidden;
}

.container{
    position:relative;
    width:340px;
    height:250px;
    cursor:pointer;
}

/* LETTER */

.letter{
    position:absolute;
    width:290px;
    height:360px;
    background:white;
    left:50%;
    transform:translateX(-50%);
    bottom:30px;
    border-radius:8px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    transition:.9s ease;
    z-index:1;
}

.container.open .letter{
    transform:translate(-50%,-180px);
}

.letter h2{
    margin-bottom:20px;
    color:#7a4b25;
}

.letter p{
    line-height:1.7;
    color:#555;
}

/* ENVELOPE */

.envelope{
    position:absolute;
    width:340px;
    height:220px;
    bottom:0;
}

/* back */

.back{
    position:absolute;
    width:100%;
    height:100%;
    background:#9b6b43;
    border-radius:0 0 10px 10px;
}

/* flap */

.flap{
    position:absolute;
    width:100%;
    height:160px;
    background:#b17b4d;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:.8s;
    z-index:5;
}

.container.open .flap{
    transform:rotateX(180deg);
}

/* left */

.left{
    position:absolute;
    width:50%;
    height:100%;
    background:#8c5d38;
    clip-path:polygon(0 0,100% 50%,0 100%);
    left:0;
    z-index:6;
}

/* right */

.right{
    position:absolute;
    width:50%;
    height:100%;
    background:#8c5d38;
    clip-path:polygon(100% 0,0 50%,100% 100%);
    right:0;
    z-index:6;
}

/* bottom */

.front{
    position:absolute;
    width:100%;
    height:100%;
    background:#a16d45;
    clip-path:polygon(0 100%,50% 40%,100% 100%);
    z-index:7;
}

/* text */

.tap{
    position:absolute;
    bottom:-45px;
    width:100%;
    text-align:center;
    color:#8c5d38;
    font-size:18px;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:.4;
    }
}
</style>

</head>
<body>

<div class="container" onclick="openLetter()">

    <div class="letter">
        <h2>Dear You, ❤️</h2>

        <p>
            Replace this with your own message.<br><br>

            You can write a love letter, birthday greeting,
            apology, confession, or anything you'd like.

            <br><br>

            Love,<br>
            Your Name
        </p>
    </div>

    <div class="envelope">

        <div class="back"></div>

        <div class="flap"></div>

        <div class="left"></div>

        <div class="right"></div>

        <div class="front"></div>

    </div>

    <div class="tap">
        Click the envelope
    </div>

</div>

<script>
function openLetter(){
    document.querySelector(".container").classList.toggle("open");
}
</script>

</body>
</html>
